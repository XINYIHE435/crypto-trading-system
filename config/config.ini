[EXCHANGES]
# 交易所API配置
okx_base_url = https://www.okx.com
binance_base_url = https://api.binance.com
bybit_base_url = https://api.bybit.com
huobi_base_url = https://api.huobi.pro
kucoin_base_url = https://api.kucoin.com
gate_base_url = https://api.gateio.ws
bitget_base_url = https://api.bitget.com

[data]
# 数据下载设置
save_path = data/raw
symbols = BTC/USDT,ETH/USDT,BNB/USDT,SOL/USDT,ADA/USDT
start_date = 2025-12-01
end_date = 2025-12-31
default_interval = 30m

[download]
# 下载控制设置
max_concurrent = 5
rate_limit = 0.1
retry_attempts = 3
timeout = 30

[TIME_RANGE]
# 时间范围设置 (2024-2025)
# 已移至 [data] 段

[SYMBOLS]
# 通用交易对 (需要根据实际情况调整)
# 已移至 [data] 段

[STORAGE]
# 数据存储设置
data_directory = ./data
file_format = csv
compression = true

[ARBITRAGE]
# 套利参数配置
min_profit_threshold = 0.002
max_positions = 5
position_timeout = 7200
risk_max_drawdown = 0.05
stop_loss_pct = 0.05
take_profit_pct = 0.015

[LOGGING]
log_level = INFO
log_file = ./logs/data_downloader.log